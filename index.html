<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paleblood Vigil — Algorithmic Art</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Crimson Text', serif;
  background: #0f0008;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: #c9a0a0;
}

header {
  background: rgba(15,0,10,0.97);
  border-bottom: 1px solid #4a0022;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 10;
}
.logo {
  width: 30px; height: 30px;
  background: radial-gradient(circle at 35% 35%, #aa0000, #5d0018);
  border-radius: 50%;
  box-shadow: 0 0 14px #8b000088;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 600;
  color: #e0b0b0; letter-spacing: 0.1em;
}
header span { font-size: 12px; color: #6a3045; font-style: italic; }

.workspace { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 230px; min-width: 230px;
  background: rgba(12,0,8,0.98);
  border-right: 1px solid #350018;
  padding: 18px 14px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
}

.section-title {
  font-family: 'Cinzel', serif;
  font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: #7a2838; margin-bottom: 10px;
}

.seed-display {
  background: #140008;
  border: 1px solid #4a0022;
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 13px; color: #d09090;
  text-align: center; margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
  font-family: 'Cinzel', serif;
}

.btn-row { display: flex; gap: 5px; }
.btn {
  flex: 1; padding: 6px 4px;
  border: 1px solid #4a0022;
  border-radius: 3px;
  background: #140008;
  font-size: 11px; font-family: 'Crimson Text', serif;
  cursor: pointer; color: #b07070;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: #220014; border-color: #8a0038; color: #f09090; }
.btn:active { transform: scale(0.97); }
.btn.primary {
  background: linear-gradient(135deg, #6a0020, #4d0014);
  color: #f0b0b0; border-color: #8a0035;
}
.btn.primary:hover { background: linear-gradient(135deg, #8a0028, #6a001a); }

.jump-row { display: flex; gap: 5px; margin-top: 5px; }
.jump-row input {
  flex: 1; border: 1px solid #4a0022; border-radius: 3px;
  padding: 5px 7px; font-size: 11px;
  font-family: 'Crimson Text', serif;
  background: #140008; color: #d09090; outline: none;
}
.jump-row input:focus { border-color: #8a0038; }

.control-group { margin-bottom: 11px; }
.control-group label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #8a5060; margin-bottom: 4px;
}
.control-group label .val { color: #d0a0a0; font-family: 'Cinzel', serif; font-size: 10px; }
.control-group input[type=range] {
  width: 100%; -webkit-appearance: none;
  height: 2px; border-radius: 1px;
  background: linear-gradient(to right, #8b0000 var(--pct,50%), #3a0018 var(--pct,50%));
  outline: none; cursor: pointer;
}
.control-group input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #aa0000;
  box-shadow: 0 0 8px #aa000099;
}
.divider { height: 1px; background: #220012; }
</style>
</head>
<body>

<header>
  <div class="logo"></div>
  <h1>Paleblood Vigil</h1>
  <span>the hunt · eldritch convergence · cosmic horror</span>
</header>

<div class="workspace">
<aside class="sidebar">

  <div>
    <div class="section-title">Seed</div>
    <div class="seed-display" id="seed-display">6660</div>
    <div class="btn-row">
      <button class="btn" onclick="changeSeed(-1)">◀</button>
      <button class="btn" onclick="changeSeed(1)">▶</button>
    </div>
    <div class="btn-row" style="margin-top:5px">
      <button class="btn primary" onclick="rndSeed()">⟳ Random Nightmare</button>
    </div>
    <div class="jump-row">
      <input type="number" id="seed-input" placeholder="Jump to seed…">
      <button class="btn" onclick="jumpSeed()">Go</button>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-title">Parameters</div>
    <div class="control-group">
      <label>Blood Count <span class="val" id="v-blood">2000</span></label>
      <input type="range" id="s-blood" min="500" max="4000" step="100" value="2000" oninput="up('blood',this)">
    </div>
    <div class="control-group">
      <label>Gravity Pull <span class="val" id="v-pull">1.2</span></label>
      <input type="range" id="s-pull" min="0.2" max="3.0" step="0.1" value="1.2" oninput="up('pull',this)">
    </div>
    <div class="control-group">
      <label>Turbulence <span class="val" id="v-turb">3</span></label>
      <input type="range" id="s-turb" min="0.5" max="8" step="0.5" value="3" oninput="up('turb',this)">
    </div>
    <div class="control-group">
      <label>Tentacles <span class="val" id="v-tent">8</span></label>
      <input type="range" id="s-tent" min="2" max="20" step="1" value="8" oninput="up('tent',this)">
    </div>
    <div class="control-group">
      <label>Viscosity <span class="val" id="v-visc">2.5</span></label>
      <input type="range" id="s-visc" min="0.5" max="6" step="0.25" value="2.5" oninput="up('visc',this)">
    </div>
    <div class="control-group">
      <label>Trail Fade <span class="val" id="v-fade">8</span></label>
      <input type="range" id="s-fade" min="2" max="30" step="1" value="8" oninput="up('fade',this)">
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-title">Actions</div>
    <div class="btn-row">
      <button class="btn primary" onclick="doReinit()">↺ Begin the Hunt</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn" onclick="doReset()">Reset</button>
      <button class="btn" onclick="doPNG()">↓ PNG</button>
    </div>
  </div>

</aside>

<main style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#08000f;">
  <div id="cc"></div>
</main>
</div>

<script>
// ═══════════════════════════════════════════════
//  PALEBLOOD VIGIL — Vileblood Hymn
//  Two systems: blood fluid + writhing tentacles.
//  Blood particles drawn to orbiting Nightmare
//  attractors via inverse-square gravity + Perlin
//  turbulence. Tentacles chain-IK from screen edges.
//  Rotating eldritch sigils in the substrate.
// ═══════════════════════════════════════════════

const P = {
  seed:  6660,
  blood: 2000,
  pull:  1.2,
  turb:  3,
  tent:  8,
  visc:  2.5,
  fade:  8,
};

let _needReinit = false;
document.addEventListener('reinit', () => { _needReinit = true; });

new p5(p => {

  let trailPg;
  let sz;
  let particles  = [];
  let attractors = [];
  let tentacles  = [];
  let fc = 0;

  // ── Attractor ─────────────────────────────────
  class Attractor {
    constructor(bx, by, str) {
      this.bx = bx; this.by = by; this.str = str;
      this.orbitR     = p.random(30, sz * 0.18);
      this.orbitAngle = p.random(p.TWO_PI);
      this.orbitSpeed = p.random(0.004, 0.009) * (p.random() < 0.5 ? 1 : -1);
      this.pulseOff   = p.random(p.TWO_PI);
      this.x = bx; this.y = by;
    }
    update() {
      this.orbitAngle += this.orbitSpeed;
      this.x = this.bx + Math.cos(this.orbitAngle) * this.orbitR;
      this.y = this.by + Math.sin(this.orbitAngle) * this.orbitR;
    }
    pulse() { return 0.75 + 0.25 * Math.sin(fc * 0.04 + this.pulseOff); }
  }

  // ── Blood Particle ────────────────────────────
  class Particle {
    constructor() { this.reset(true); }
    reset(anywhere) {
      if (anywhere) {
        this.x = p.random(sz); this.y = p.random(sz);
      } else {
        let a = attractors[Math.floor(p.random(attractors.length))];
        this.x = a.x + p.randomGaussian(0, sz * 0.15);
        this.y = a.y + p.randomGaussian(0, sz * 0.15);
      }
      this.vx = p.randomGaussian(0, 0.4);
      this.vy = p.randomGaussian(0, 0.4);
      this.life    = p.random(0.4, 1.0);
      this.maxLife = this.life;
      this.sz      = p.random(0.7, 2.4);
    }
    update() {
      for (let a of attractors) {
        let dx = a.x - this.x, dy = a.y - this.y;
        let d2 = dx*dx + dy*dy;
        let d  = Math.sqrt(d2);
        if (d < 4) { this.reset(false); return; }
        let f = Math.min((P.pull * a.str * a.pulse()) / d2, 1.2);
        this.vx += (dx / d) * f;
        this.vy += (dy / d) * f;
      }
      // Perlin flow perturbation
      let nx = this.x * 0.0018 * P.turb;
      let ny = this.y * 0.0018 * P.turb;
      let nv = p.noise(nx + P.seed * 0.01, ny + P.seed * 0.01, fc * 0.00035);
      let na = nv * p.TWO_PI * 2.3;
      this.vx += Math.cos(na) * 0.12;
      this.vy += Math.sin(na) * 0.12;
      // Damping
      let damp = 1 - P.visc * 0.008;
      this.vx *= damp; this.vy *= damp;
      // Speed cap
      let spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      let cap = 4 + P.pull;
      if (spd > cap) { this.vx = this.vx/spd*cap; this.vy = this.vy/spd*cap; }
      this.x += this.vx; this.y += this.vy;
      this.life -= 0.0025;
      if (this.life <= 0 || this.x < -2 || this.x > sz+2 || this.y < -2 || this.y > sz+2) {
        this.reset(false);
      }
    }
    draw() {
      let spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      let alpha = (this.life / this.maxLife) * 90;
      // Velocity-driven color: resting crimson → blood-orange at speed
      let hue = p.map(spd, 0, 5, 0, 20);
      let sat = p.map(spd, 0, 4, 72, 95);
      let bri = p.map(spd, 0, 5, 52, 92);
      trailPg.stroke(hue, sat, bri, alpha);
      let sw = this.sz * (0.5 + spd * 0.18);
      trailPg.strokeWeight(sw);
      if (spd > 0.6) {
        let len = Math.min(spd * 2.5, 14);
        let nx = this.vx/spd, ny = this.vy/spd;
        trailPg.line(this.x - nx*len, this.y - ny*len, this.x, this.y);
      } else {
        trailPg.point(this.x, this.y);
      }
    }
  }

  // ── Tentacle ──────────────────────────────────
  // Chain IK: head steered by Perlin noise,
  // each segment follows the one before via
  // elastic constraint (FABRIK-lite).
  class Tentacle {
    constructor(ox, oy) {
      this.numSeg  = Math.floor(p.random(14, 28));
      this.segLen  = p.random(10, 22);
      this.thick   = p.random(2, 5.5);
      this.noiseOff = p.random(2000);
      this.phase   = p.random(p.TWO_PI);
      this.age     = 0;
      this.maxAge  = p.random(400, 950);
      this.segs    = [];
      for (let i = 0; i < this.numSeg; i++)
        this.segs.push({ x: ox, y: oy, a: p.random(p.TWO_PI) });
    }
    get alive() { return this.age < this.maxAge; }
    update() {
      this.age++;
      let h = this.segs[0];
      let nv = p.noise(h.x*0.003 + this.noiseOff, h.y*0.003 + this.noiseOff, fc*0.0005);
      let target = nv * p.TWO_PI * 2;
      // Smooth angular steering
      let diff = ((target - h.a + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
      h.a += diff * 0.07;
      h.x += Math.cos(h.a) * 1.7;
      h.y += Math.sin(h.a) * 1.7;
      // FABRIK-lite chain
      for (let i = 1; i < this.segs.length; i++) {
        let s = this.segs[i], prev = this.segs[i-1];
        let dx = prev.x - s.x, dy = prev.y - s.y;
        let d  = Math.sqrt(dx*dx + dy*dy);
        if (d > this.segLen) {
          let r = (d - this.segLen) / d * 0.5;
          s.x += dx * r; s.y += dy * r;
        }
      }
    }
    draw() {
      let fadeIn  = Math.min(this.age / 50, 1);
      let fadeOut = this.age > this.maxAge - 70 ? (this.maxAge - this.age) / 70 : 1;
      let alpha   = fadeIn * fadeOut;
      for (let i = 0; i < this.segs.length - 1; i++) {
        let s = this.segs[i], sn = this.segs[i+1];
        let t     = i / this.segs.length;
        let sw    = this.thick * (1 - t * 0.75);
        let pulse = 0.7 + 0.3 * Math.sin(fc * 0.04 + i * 0.25 + this.phase);
        let bri   = 22 + t * 14 + pulse * 8;
        // Deep purple-black flesh, slightly iridescent at tips
        p.stroke(280 + t * 35, 55, bri, alpha * 72);
        p.strokeWeight(sw);
        p.line(s.x, s.y, sn.x, sn.y);
        // Rim highlight
        if (sw > 1.5) {
          p.stroke(305, 38, bri + 16, alpha * 28);
          p.strokeWeight(sw * 0.28);
          p.line(s.x - Math.sin(s.a||0)*sw*0.3, s.y + Math.cos(s.a||0)*sw*0.3,
                 sn.x- Math.sin(s.a||0)*sw*0.3, sn.y+ Math.cos(s.a||0)*sw*0.3);
        }
        // Sucker nodes every 5 segments
        if (i % 5 === 0 && sw > 1) {
          p.noStroke();
          p.fill(325, 50, 28, alpha * 55);
          p.circle(s.x, s.y, sw * 2.2);
          p.fill(325, 30, 42, alpha * 22);
          p.circle(s.x, s.y, sw * 1.0);
        }
      }
    }
  }

  // ── Setup ─────────────────────────────────────
  p.setup = function() {
    sz = Math.min(window.innerWidth - 240, window.innerHeight - 64, 860);
    let cnv = p.createCanvas(sz, sz);
    cnv.parent('cc');
    p.colorMode(p.HSB, 360, 100, 100, 100);
    trailPg = p.createGraphics(sz, sz);
    trailPg.colorMode(p.HSB, 360, 100, 100, 100);
    init();
  };

  // ── Draw loop ─────────────────────────────────
  p.draw = function() {
    if (_needReinit) { init(); _needReinit = false; }

    // Trail persistence fade — slightly purple-dark, not pure black
    trailPg.noStroke();
    trailPg.fill(265, 25, 4, P.fade * 0.28);
    trailPg.rect(0, 0, sz, sz);

    // Update attractors
    for (let a of attractors) a.update();

    // Update + draw particles onto trail layer
    for (let part of particles) { part.update(); part.draw(); }

    // Composite trail onto main canvas
    p.background(262, 22, 5);
    p.image(trailPg, 0, 0);

    // Attractor entity glow
    p.noStroke();
    for (let a of attractors) {
      let pulse = a.pulse();
      for (let r = sz * 0.12; r > 0; r -= sz * 0.013) {
        let alpha = p.map(r, 0, sz * 0.12, 10, 0) * pulse;
        p.fill(340, 68, 52, alpha);
        p.circle(a.x, a.y, r * 2);
      }
      // Hot core
      p.fill(5, 82, 78, 35 * pulse);
      p.circle(a.x, a.y, 5 * pulse);
      p.fill(0, 60, 95, 20 * pulse);
      p.circle(a.x, a.y, 2.5);
    }

    // Tentacles (drawn directly — no trail layer)
    p.noFill();
    for (let i = tentacles.length - 1; i >= 0; i--) {
      tentacles[i].update();
      tentacles[i].draw();
      if (!tentacles[i].alive) tentacles.splice(i, 1);
    }
    // Keep tentacle count at target
    while (tentacles.length < P.tent) {
      let edge = Math.floor(p.random(4));
      let ox = edge === 0 ? p.random(sz) : edge === 1 ? sz  : edge === 2 ? p.random(sz) : 0;
      let oy = edge === 0 ? 0            : edge === 1 ? p.random(sz) : edge === 2 ? sz   : p.random(sz);
      tentacles.push(new Tentacle(ox, oy));
    }

    // Eldritch sigil background geometry (every 3rd frame)
    if (fc % 3 === 0) drawSigil();

    // Radial vignette
    p.noStroke();
    for (let r = sz * 0.85; r > sz * 0.35; r -= sz * 0.08) {
      let a = p.map(r, sz * 0.35, sz * 0.85, 9, 0);
      p.fill(265, 35, 1, a);
      p.circle(sz * 0.5, sz * 0.5, r * 2);
    }

    fc++;
  };

  // ── Sigil ─────────────────────────────────────
  // Slowly counter-rotating nested polygons + spokes
  // faintly visible in the substrate — visible only
  // to those who look for it.
  function drawSigil() {
    p.push();
    p.translate(sz * 0.5, sz * 0.5);
    p.noFill();
    const rings = [
      { sides: 6,  r: sz * 0.28, dir:  1, alpha: 7 },
      { sides: 9,  r: sz * 0.38, dir: -1, alpha: 5 },
      { sides: 12, r: sz * 0.47, dir:  1, alpha: 3 },
    ];
    for (let ri of rings) {
      let rot = fc * 0.0003 * ri.dir;
      p.stroke(295, 38, 48, ri.alpha);
      p.strokeWeight(0.5);
      p.beginShape();
      for (let i = 0; i <= ri.sides; i++) {
        let a = i / ri.sides * p.TWO_PI + rot;
        p.vertex(Math.cos(a) * ri.r, Math.sin(a) * ri.r);
      }
      p.endShape(p.CLOSE);
      // Spokes
      p.stroke(285, 28, 40, ri.alpha * 0.55);
      for (let i = 0; i < ri.sides; i++) {
        let a = i / ri.sides * p.TWO_PI + rot;
        p.line(Math.cos(a)*ri.r*0.08, Math.sin(a)*ri.r*0.08,
               Math.cos(a)*ri.r,      Math.sin(a)*ri.r);
      }
    }
    p.pop();
  }

  // ── Init ──────────────────────────────────────
  function init() {
    fc = 0;
    particles  = [];
    attractors = [];
    tentacles  = [];

    p.randomSeed(P.seed);
    p.noiseSeed(P.seed);
    trailPg.background(262, 22, 5);

    // 4 orbiting Nightmare attractors
    let cx = sz * 0.5, cy = sz * 0.5;
    for (let i = 0; i < 4; i++) {
      let a = i / 4 * p.TWO_PI + p.random(0.4);
      let r = sz * p.random(0.10, 0.26);
      attractors.push(new Attractor(
        cx + Math.cos(a) * r,
        cy + Math.sin(a) * r,
        p.random(0.6, 1.4)
      ));
    }

    // Blood particles
    for (let i = 0; i < P.blood; i++) particles.push(new Particle());

    // Tentacles
    for (let i = 0; i < P.tent; i++) {
      let edge = Math.floor(p.random(4));
      let ox = edge === 0 ? p.random(sz) : edge === 1 ? sz  : edge === 2 ? p.random(sz) : 0;
      let oy = edge === 0 ? 0            : edge === 1 ? p.random(sz) : edge === 2 ? sz   : p.random(sz);
      tentacles.push(new Tentacle(ox, oy));
    }
  }

  p.windowResized = function() {
    sz = Math.min(window.innerWidth - 240, window.innerHeight - 64, 860);
    p.resizeCanvas(sz, sz);
    trailPg.resizeCanvas(sz, sz);
    _needReinit = true;
  };

}, document.getElementById('cc'));

// ── UI handlers ────────────────────────────────
const DEFAULTS = { ...P };

function up(key, el) {
  let v   = parseFloat(el.value);
  let pct = ((v - +el.min) / (+el.max - +el.min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  P[key] = key === 'tent' ? Math.round(v) : v;
  document.getElementById('v-' + key).textContent = P[key];
}

function setSeedDisplay() { document.getElementById('seed-display').textContent = P.seed; }
function changeSeed(d)    { P.seed = Math.max(1, P.seed + d); setSeedDisplay(); doReinit(); }
function rndSeed()        { P.seed = Math.floor(Math.random() * 99999) + 1; setSeedDisplay(); doReinit(); }
function jumpSeed() {
  let v = +document.getElementById('seed-input').value;
  if (v > 0) { P.seed = Math.floor(v); setSeedDisplay(); doReinit(); }
}
function doReinit() { document.dispatchEvent(new CustomEvent('reinit')); }

function doReset() {
  Object.assign(P, DEFAULTS);
  setSeedDisplay();
  ['blood','pull','turb','tent','visc','fade'].forEach(k => {
    let el = document.getElementById('s-' + k);
    el.value = P[k];
    let pct = ((P[k] - +el.min) / (+el.max - +el.min) * 100).toFixed(1);
    el.style.setProperty('--pct', pct + '%');
    document.getElementById('v-' + k).textContent = P[k];
  });
  doReinit();
}

function doPNG() {
  let cnv = document.querySelector('#cc canvas');
  if (!cnv) return;
  let a   = document.createElement('a');
  a.download = `paleblood-vigil-seed-${P.seed}.png`;
  a.href     = cnv.toDataURL('image/png');
  a.click();
}

// Init slider gradients on load
document.querySelectorAll('input[type=range]').forEach(el => {
  let pct = ((+el.value - +el.min) / (+el.max - +el.min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
});
</script>
</body>
</html>
